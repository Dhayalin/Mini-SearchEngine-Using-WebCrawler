<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MiniSearch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #1e1e2e;
    --accent: #7c6af7;
    --accent2: #4fc3f7;
    --text: #e8e8f0;
    --muted: #6b6b82;
    --green: #4ade80;
    --red: #f87171;
    --radius: 10px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Grid bg ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  .page { position: relative; z-index: 1; }

  /* ── Header ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(10px);
    background: rgba(10,10,15,0.8);
    position: sticky; top: 0; z-index: 100;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 1.1rem;
    color: var(--accent);
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent2); }

  .status-pill {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    padding: 4px 12px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    display: flex; align-items: center; gap: 6px;
  }
  .status-pill .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .status-pill.ready .dot { background: var(--green); }
  .status-pill.crawling .dot {
    background: var(--accent);
    animation: pulse 1s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── Hero ── */
  .hero {
    display: flex; flex-direction: column; align-items: center;
    padding: 80px 20px 40px;
    text-align: center;
  }

  .hero h1 {
    font-family: 'Space Mono', monospace;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 700;
    letter-spacing: -2px;
    line-height: 1.1;
    margin-bottom: 12px;
  }
  .hero h1 .accent { color: var(--accent); }
  .hero h1 .accent2 { color: var(--accent2); }

  .hero p {
    color: var(--muted);
    font-size: 0.95rem;
    max-width: 400px;
    line-height: 1.6;
    margin-bottom: 40px;
  }

  /* ── Search bar ── */
  .search-wrap {
    width: 100%; max-width: 640px;
    position: relative;
  }

  .search-bar {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-bar:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,106,247,0.15);
  }

  #search-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    padding: 14px 18px;
  }
  #search-input::placeholder { color: var(--muted); }

  #search-btn {
    background: var(--accent);
    border: none;
    color: white;
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    padding: 0 22px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.5px;
  }
  #search-btn:hover { background: #6a58e0; }
  #search-btn:active { transform: scale(0.97); }

  .search-meta {
    margin-top: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    height: 16px;
    text-align: left;
  }

  /* ── Crawl panel ── */
  .crawl-section {
    width: 100%; max-width: 640px;
    margin-top: 16px;
  }

  .crawl-toggle {
    background: none; border: 1px solid var(--border);
    color: var(--muted); font-family: 'Space Mono', monospace;
    font-size: 0.72rem; padding: 6px 14px; border-radius: 6px;
    cursor: pointer; transition: all 0.2s;
  }
  .crawl-toggle:hover { border-color: var(--accent2); color: var(--accent2); }

  .crawl-form {
    display: none;
    margin-top: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    gap: 10px;
  }
  .crawl-form.open { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }

  .crawl-form input {
    flex: 1; min-width: 200px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    padding: 9px 14px;
    outline: none;
  }
  .crawl-form input:focus { border-color: var(--accent2); }

  .crawl-form label { font-size: 0.8rem; color: var(--muted); white-space: nowrap; }

  .crawl-form select {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 0.85rem;
    padding: 9px 10px; outline: none; cursor: pointer;
  }

  #crawl-btn {
    background: var(--accent2); border: none;
    color: #0a0a0f; font-family: 'Space Mono', monospace;
    font-size: 0.75rem; font-weight: 700;
    padding: 9px 18px; border-radius: 6px;
    cursor: pointer; transition: opacity 0.2s;
    white-space: nowrap;
  }
  #crawl-btn:hover { opacity: 0.85; }
  #crawl-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .crawl-status-bar {
    width: 100%; height: 3px; background: var(--border);
    border-radius: 2px; overflow: hidden; margin-top: 6px; display: none;
  }
  .crawl-status-bar.active { display: block; }
  .crawl-progress {
    height: 100%; background: var(--accent2);
    border-radius: 2px;
    transition: width 0.5s ease;
    width: 0%;
  }

  /* ── Results ── */
  .results-section {
    max-width: 780px; margin: 0 auto;
    padding: 20px 24px 60px;
  }

  .results-header {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem; color: var(--muted);
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 10px;
  }
  .results-header .divider { flex: 1; height: 1px; background: var(--border); }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 12px;
    transition: border-color 0.2s, transform 0.15s;
    cursor: pointer;
    animation: slideIn 0.3s ease forwards;
    opacity: 0;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .result-card:hover { border-color: var(--accent); transform: translateY(-2px); }

  .result-rank {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem; color: var(--accent);
    margin-bottom: 6px;
    display: flex; align-items: center; gap: 8px;
  }

  .result-title {
    font-size: 1rem; font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
    display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .result-url {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem; color: var(--accent2);
    margin-bottom: 10px;
    display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .result-snippet {
    font-size: 0.85rem; color: var(--muted);
    line-height: 1.6;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .score-bars {
    display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap;
  }

  .score-pill {
    font-family: 'Space Mono', monospace;
    font-size: 0.62rem;
    padding: 3px 8px;
    border-radius: 4px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    color: var(--muted);
    display: flex; align-items: center; gap: 4px;
  }
  .score-pill .bar {
    width: 32px; height: 3px; border-radius: 2px; background: var(--border);
    overflow: hidden;
  }
  .score-pill .fill {
    height: 100%; border-radius: 2px;
    background: var(--accent);
  }
  .score-pill.tfidf .fill   { background: #7c6af7; }
  .score-pill.pr .fill      { background: #f59e0b; }
  .score-pill.freq .fill    { background: #4ade80; }
  .score-pill.rec .fill     { background: #4fc3f7; }

  /* ── Empty / error states ── */
  .state-msg {
    text-align: center; padding: 60px 20px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    line-height: 2;
  }
  .state-msg .icon { font-size: 2.5rem; display: block; margin-bottom: 12px; }

  /* ── Stats bar ── */
  .stats-strip {
    display: flex; justify-content: center; gap: 32px;
    padding: 16px; margin: 0 auto 8px;
    max-width: 640px;
  }
  .stat-item {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem; color: var(--muted);
    text-align: center;
  }
  .stat-item strong { display: block; font-size: 1.1rem; color: var(--text); }
</style>
</head>
<body>
<div class="page">

  <header>
    <div class="logo">mini<span>search</span>.py</div>
    <div class="status-pill" id="status-pill">
      <span class="dot"></span>
      <span id="status-text">checking…</span>
    </div>
  </header>

  <section class="hero">
    <h1><span class="accent">crawl.</span> <span class="accent2">index.</span> retrieve.</h1>
    <p>A Python-based mini search engine with TF-IDF ranking, PageRank scoring, and real-time web crawling.</p>

    <div class="search-wrap">
      <div class="search-bar">
        <input id="search-input" type="text" placeholder="search indexed pages…" autocomplete="off"/>
        <button id="search-btn">SEARCH</button>
      </div>
      <div class="search-meta" id="search-meta"></div>
    </div>

    <div class="crawl-section">
      <button class="crawl-toggle" id="crawl-toggle">+ new crawl</button>
      <div class="crawl-form" id="crawl-form">
        <input id="crawl-url" type="url" placeholder="https://books.toscrape.com" value="https://books.toscrape.com"/>
        <label>max pages</label>
        <select id="crawl-pages">
          <option value="25">25</option>
          <option value="50" selected>50</option>
          <option value="100">100</option>
          <option value="200">200</option>
        </select>
        <button id="crawl-btn">▶ CRAWL</button>
        <div class="crawl-status-bar" id="crawl-bar">
          <div class="crawl-progress" id="crawl-progress"></div>
        </div>
      </div>
    </div>

    <div class="stats-strip" id="stats-strip"></div>
  </section>

  <section class="results-section" id="results-section"></section>

</div>

<script>
const API = '';  // same origin

// ── Utility ──────────────────────────────────────────────────────────────
async function get(path) {
  const r = await fetch(API + path);
  return r.json();
}
async function post(path, body) {
  const r = await fetch(API + path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  return r.json();
}

// ── Status ───────────────────────────────────────────────────────────────
async function refreshStatus() {
  const pill = document.getElementById('status-pill');
  const txt  = document.getElementById('status-text');
  try {
    const s = await get('/stats');
    if (s.status === 'ready') {
      pill.className = 'status-pill ready';
      txt.textContent = `${s.total_documents} docs indexed`;
      renderStats(s);
    } else {
      pill.className = 'status-pill';
      txt.textContent = 'no index — run a crawl';
    }
  } catch {
    pill.className = 'status-pill';
    txt.textContent = 'API offline';
  }
}

function renderStats(s) {
  document.getElementById('stats-strip').innerHTML = `
    <div class="stat-item"><strong>${s.total_documents}</strong>pages</div>
    <div class="stat-item"><strong>${s.unique_terms?.toLocaleString()}</strong>unique terms</div>
    <div class="stat-item"><strong>${s.avg_postings_per_term}</strong>avg postings/term</div>
  `;
}

// ── Search ───────────────────────────────────────────────────────────────
async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  const meta  = document.getElementById('search-meta');
  const sec   = document.getElementById('results-section');
  meta.textContent = 'searching…';
  sec.innerHTML = '';

  try {
    const data = await get(`/search?q=${encodeURIComponent(q)}&limit=10`);

    if (data.detail) {
      meta.textContent = '';
      sec.innerHTML = `<div class="state-msg"><span class="icon">⚠️</span>${data.detail}</div>`;
      return;
    }

    meta.textContent = `${data.total_results} results in ${data.search_time_ms} ms`;

    if (!data.results.length) {
      sec.innerHTML = `<div class="state-msg"><span class="icon">🔍</span>No results for "${q}"</div>`;
      return;
    }

    sec.innerHTML = `
      <div class="results-header">
        <span>${data.total_results} results</span>
        <span class="divider"></span>
        <span>${data.search_time_ms} ms</span>
      </div>`;

    data.results.forEach((r, i) => {
      const card = document.createElement('div');
      card.className = 'result-card';
      card.style.animationDelay = `${i * 45}ms`;
      card.innerHTML = `
        <div class="result-rank">
          #${i+1} &nbsp;·&nbsp; score ${r.score}
        </div>
        <div class="result-title">${escHtml(r.title)}</div>
        <div class="result-url">${escHtml(r.url)}</div>
        <div class="result-snippet">${escHtml(r.snippet)}</div>
        <div class="score-bars">
          ${scorePill('TF-IDF', r.tfidf, 'tfidf')}
          ${scorePill('PageRank', r.pagerank, 'pr')}
          ${scorePill('Freq', r.keyword_freq, 'freq')}
          ${scorePill('Recency', r.recency, 'rec')}
        </div>`;
      card.onclick = () => window.open(r.url, '_blank');
      sec.appendChild(card);
    });

  } catch (e) {
    meta.textContent = '';
    sec.innerHTML = `<div class="state-msg"><span class="icon">💥</span>Error: ${e.message}</div>`;
  }
}

function scorePill(label, val, cls) {
  const pct = Math.round(val * 100);
  return `<span class="score-pill ${cls}">${label}<div class="bar"><div class="fill" style="width:${pct}%"></div></div>${pct}%</span>`;
}

function escHtml(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Crawl ─────────────────────────────────────────────────────────────────
let pollTimer = null;

document.getElementById('crawl-toggle').onclick = () => {
  const f = document.getElementById('crawl-form');
  f.classList.toggle('open');
};

document.getElementById('crawl-btn').onclick = async () => {
  const url   = document.getElementById('crawl-url').value.trim();
  const pages = +document.getElementById('crawl-pages').value;
  if (!url) return;

  const btn  = document.getElementById('crawl-btn');
  const bar  = document.getElementById('crawl-bar');
  const prog = document.getElementById('crawl-progress');
  const pill = document.getElementById('status-pill');
  const txt  = document.getElementById('status-text');

  btn.disabled = true;
  bar.classList.add('active');
  prog.style.width = '5%';
  pill.className = 'status-pill crawling';
  txt.textContent = 'crawling…';

  try {
    await post('/crawl', { url, max_pages: pages });
  } catch (e) {
    alert('Could not start crawl: ' + e.message);
    btn.disabled = false; return;
  }

  // Poll status
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    const s = await get('/crawl/status');
    prog.style.width = s.progress + '%';
    txt.textContent  = s.message;
    if (!s.running) {
      clearInterval(pollTimer);
      btn.disabled = false;
      bar.classList.remove('active');
      await refreshStatus();
    }
  }, 1500);
};

// ── Events ────────────────────────────────────────────────────────────────
document.getElementById('search-btn').onclick = doSearch;
document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

// ── Init ──────────────────────────────────────────────────────────────────
refreshStatus();
</script>
</body>
</html>
